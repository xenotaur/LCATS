# Optional local checks for contributors.
# CI and scripts/* remain the source of truth.
default_language_version:
  python: python3.11

exclude: |
  (?x)^(
    corpora/|
    experiments/|
    Papers/|
    Resources/|
    lcats/KMo/|
    lcats/notebooks/|
    lcats/output/|
    lcats/dist/|
    lcats/htmlcov/|
    lcats/lcats\.egg-info/
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        files: ^lcats/(lcats|tests|tools)/.*$

      - id: end-of-file-fixer
        files: ^lcats/(lcats|tests|tools)/.*$

      - id: check-merge-conflict
        files: ^lcats/(lcats|tests|tools)/.*$

      - id: check-yaml
        files: ^lcats/(lcats|tests|tools)/.*\.(ya?ml)$

      - id: check-json
        files: ^lcats/(lcats|tests|tools)/.*\.json$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^lcats/(lcats|tests|tools)/.*\.py$

  - repo: https://github.com/psf/black
    rev: 25.11.0
    hooks:
      - id: black
        files: ^lcats/(lcats|tests|tools)/.*\.py$