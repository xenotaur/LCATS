# Optional local checks for contributors.
# CI and scripts/* remain the source of truth.
default_language_version:
  python: python3.11

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Remove trailing spaces in text files.
      - id: trailing-whitespace
      # Ensure files end with a single newline.
      - id: end-of-file-fixer
      # Prevent accidental unresolved merge markers.
      - id: check-merge-conflict
      # Validate YAML syntax in repo config files.
      - id: check-yaml
      # Validate JSON syntax in data/config files.
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Fast linting with auto-fix for Python files under lcats/.
      - id: ruff
        args: [--fix]
        files: ^lcats/.*\.py$

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      # Keep Python formatting consistent for files under lcats/.
      - id: black
        files: ^lcats/.*\.py$
